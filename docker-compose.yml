services:
  db:
    image: postgres:16-alpine
    environment: {POSTGRES_USER: ias, POSTGRES_PASSWORD: ias, POSTGRES_DB: ias}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL","pg_isready -U ias"], interval: 3s, retries: 10}
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      IAS_DATABASE_URL: postgresql+asyncpg://ias:ias@db:5432/ias
    depends_on:
      db: {condition: service_healthy}
    restart: unless-stopped   # <- kill it mid-run; it restarts and RESUMES from checkpoint
volumes: {pgdata: {}}
